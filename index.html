
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>Stock AI Analyzer</title>
</head>
<body>
<h2>AI 股票分析測試</h2>

<input id="apiKey" placeholder="輸入 Gemini API Key" style="width:300px"><br><br>
<input id="symbol" placeholder="股票代號，例如 2330"><br><br>
<button onclick="analyze()">開始分析</button>

<pre id="output"></pre>

<script>
async function callGemini(prompt, apiKey) {
  const res = await fetch("https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-goog-api-key": apiKey
    },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig: {
        temperature: 0.2,
        responseMimeType: "application/json"
      }
    })
  });

  const data = await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text || "";
}

async function analyze() {
  const apiKey = document.getElementById("apiKey").value;
  const symbol = document.getElementById("symbol").value;

  const prompt = `
請分析台灣股票 ${symbol}。

只回傳 JSON：
{
  "prediction": "up",
  "confidence": 80,
  "analysis": "簡單說明"
}
`;

  try {
    const text = await callGemini(prompt, apiKey);

    const cleaned = text
      .replace(/```json/gi, '')
      .replace(/```/g, '')
      .trim();

    const jsonMatch = cleaned.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error("格式錯誤");

    const result = JSON.parse(jsonMatch[0]);

    document.getElementById("output").textContent =
      JSON.stringify(result, null, 2);

  } catch (e) {
    document.getElementById("output").textContent =
      "❌ 錯誤:\n" + e.message;
  }
}
</script>
</body>
</html>
